<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Cuánto falta?</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input[type="date"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="date"]:focus {
      border-color: rgba(255, 255, 255, 0.6);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #e94560, #c62a47);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.98);
    }

    .result {
      margin-top: 32px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 12px;
      display: none;
    }

    .result.visible {
      display: block;
    }

    .days-number {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #f5a623, #f76b1c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .days-label {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 8px;
    }

    .error {
      margin-top: 16px;
      color: #f87171;
      font-size: 0.9rem;
      display: none;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>¿Cuánto falta?</h1>
    <p class="subtitle">Días restantes para que termine el año</p>

    <label for="fecha">Selecciona una fecha</label>
    <input type="date" id="fecha" />

    <button onclick="calcular()">Calcular</button>

    <div class="error" id="error">Por favor, selecciona una fecha válida.</div>

    <div class="result" id="result">
      <div class="days-number" id="dias"></div>
      <div class="days-label" id="mensaje"></div>
    </div>
  </div>

  <script>
    // Pre-fill today's date for convenience
    (function () {
      var today = new Date();
      var yyyy = today.getFullYear();
      var mm = String(today.getMonth() + 1).padStart(2, '0');
      var dd = String(today.getDate()).padStart(2, '0');
      document.getElementById('fecha').value = yyyy + '-' + mm + '-' + dd;
    })();

    function calcular() {
      var input = document.getElementById('fecha').value;
      var errorEl = document.getElementById('error');
      var resultEl = document.getElementById('result');
      var diasEl = document.getElementById('dias');
      var mensajeEl = document.getElementById('mensaje');

      // Reset
      errorEl.classList.remove('visible');
      resultEl.classList.remove('visible');

      if (!input) {
        errorEl.classList.add('visible');
        return;
      }

      // Parse the selected date (YYYY-MM-DD) as UTC midnight to avoid DST issues
      var parts = input.split('-');
      var year = parseInt(parts[0], 10);
      var month = parseInt(parts[1], 10) - 1;
      var day = parseInt(parts[2], 10);
      var selectedUTC = Date.UTC(year, month, day);

      // Last day of the same year at UTC midnight
      var endOfYearUTC = Date.UTC(year, 11, 31);

      // Difference in whole days (exact integer because both are UTC midnight)
      var diffDays = (endOfYearUTC - selectedUTC) / (1000 * 60 * 60 * 24);

      diasEl.textContent = diffDays;

      if (diffDays === 0) {
        mensajeEl.textContent = '¡Hoy es el último día del año!';
      } else if (diffDays === 1) {
        mensajeEl.textContent = 'día para que termine el año';
      } else {
        mensajeEl.textContent = 'días para que termine el año';
      }

      resultEl.classList.add('visible');
    }

    // Allow pressing Enter to trigger calculation
    document.getElementById('fecha').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') calcular();
    });
  </script>
</body>
</html>
